<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawradise · 預約登記</title>
<link rel="stylesheet" href="pawradise-tokens.css">
<link rel="stylesheet" href="pawradise.css">
<style>
body{display:flex;flex-direction:column;min-height:100vh;}
.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px 28px;}
.wrap{width:100%;max-width:440px;}
.brand{text-align:center;margin-bottom:34px;}
.brand .crest-lg{width:152px;height:auto;display:block;margin:0 auto 14px;filter:drop-shadow(0 4px 12px rgba(92,62,39,.18));}
.brand .wm{font-family:var(--pw-font-display);font-weight:700;font-size:34px;letter-spacing:.06em;
  color:var(--pw-navy);line-height:1;}
.brand .sub{font-size:18px;font-weight:800;color:var(--pw-ink-soft);margin-top:8px;}
.brand .tag{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--pw-ink-faint);margin-top:9px;}
.cards{display:flex;flex-direction:column;gap:13px;}
.ecard{display:flex;align-items:center;gap:16px;background:var(--pw-paper);border-radius:var(--pw-r-lg);
  box-shadow:var(--pw-shadow-card);padding:20px 22px;text-decoration:none;color:var(--pw-ink);
  border-left:4px solid var(--pw-navy);transition:transform .22s ease,box-shadow .22s ease;}
.ecard:hover{transform:translateY(-3px);box-shadow:var(--pw-shadow-hover);}
.ecard.academy{border-left-color:var(--pw-gold);}
.ecard .ic{width:54px;height:54px;border-radius:var(--pw-r-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:#EAF0F6;color:var(--pw-navy);}
.ecard.academy .ic{background:#FAF1E2;color:var(--pw-gold-deep);}
.ecard .ic .ico{width:28px;height:28px;stroke-width:1.8;}
.ecard .body{flex:1;min-width:0;}
.ecard .t{font-size:17px;font-weight:900;margin-bottom:4px;}
.ecard .d{font-size:12.5px;font-weight:600;color:var(--pw-ink-mute);line-height:1.55;}
.ecard .arrow{color:var(--pw-ink-faint);flex-shrink:0;}
.ecard:hover .arrow{color:var(--pw-navy);}
footer{background:var(--pw-paper);border-top:var(--pw-stroke) solid var(--pw-cream-deep);padding:22px 20px;}
.foot-in{max-width:440px;margin:0 auto;text-align:center;}
.foot-name{font-size:13px;font-weight:900;color:var(--pw-ink);margin-bottom:11px;}
.foot-rows{display:flex;flex-direction:column;gap:7px;font-size:12px;font-weight:600;color:var(--pw-ink-mute);align-items:center;}
.foot-row{display:flex;align-items:center;gap:7px;}
.foot-row .ico{width:14px;height:14px;color:var(--pw-gold-deep);}
.foot-row a{color:var(--pw-ink-mute);text-decoration:none;}
.foot-copy{font-size:11px;font-weight:600;color:var(--pw-ink-faint);margin-top:14px;}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="ico-bed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20v-3a3 3 0 0 1 3-3h14a3 3 0 0 1 3 3v3"/><path d="M6 14V9a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v5"/><line x1="2" y1="20" x2="2" y2="22"/><line x1="22" y1="20" x2="22" y2="22"/></symbol>
<symbol id="ico-cap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.7 3 6 3s6-2 6-3v-5"/></symbol>
<symbol id="ico-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></symbol>
<symbol id="ico-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></symbol>
<symbol id="ico-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></symbol>
<symbol id="ico-message" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></symbol>
<symbol id="ico-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></symbol>
<symbol id="ico-instagram" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></symbol>
</defs></svg>

<div class="page">
  <div class="wrap">
    <div class="brand">
      <img class="crest-lg" src="assets/pawradise-crest.png" alt="Pawradise">
      <div class="sub">校園式寵物酒店 | 毛孩社交學院</div>
    </div>
    <div class="cards">
      <a class="ecard hotel" href="Hotel Booking.html">
        <div class="ic"><svg class="ico"><use href="#ico-bed"/></svg></div>
        <div class="body">
          <div class="t">酒店入住預約</div>
          <div class="d">過夜寄宿 | 日托服務</div>
        </div>
        <svg class="ico arrow"><use href="#ico-chevron-right"/></svg>
      </a>
      <a class="ecard academy" href="Academy Booking.html">
        <div class="ic"><svg class="ico"><use href="#ico-cap"/></svg></div>
        <div class="body">
          <div class="t">社交學院課堂報名</div>
          <div class="d">S1狗狗學期 | S2情緒重建小組 | Calm Explorer Club</div>
        </div>
        <svg class="ico arrow"><use href="#ico-chevron-right"/></svg>
      </a>
    </div>
  </div>
</div>

<footer>
  <div class="foot-in">
    <div class="foot-name">Pawradise Limited</div>
    <div class="foot-rows">
      <div class="foot-row"><svg class="ico"><use href="#ico-pin"/></svg>16-17/F, Stone Rise, 200 Nathan Road, Tsim Sha Tsui</div>
      <div class="foot-row"><svg class="ico"><use href="#ico-message"/></svg>WhatsApp <a href="https://wa.me/85294596420">9459 6420</a></div>
      <div class="foot-row"><svg class="ico"><use href="#ico-instagram"/></svg>Instagram <a href="https://instagram.com/pawradise_hk">@pawradise_hk</a></div>
    </div>
    <div class="foot-copy">© 2026 Pawradise Limited. All rights reserved.</div>
  </div>
</footer>
</body>
</html>
